<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Watcher Patcher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0a0a1a;color:#f0f0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:2rem}
h1{font-size:2rem;background:linear-gradient(90deg,#10b981,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent}
.drop{width:min(500px,90vw);height:200px;border:3px dashed rgba(118,75,162,0.5);border-radius:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;cursor:pointer;transition:all 0.3s;background:rgba(30,30,50,0.35)}
.drop:hover,.drop.over{border-color:#10b981;background:rgba(16,185,129,0.08)}
.drop p{font-size:1.1rem;color:rgba(255,255,255,0.6)}
.drop .icon{font-size:3rem}
#log{width:min(500px,90vw);background:rgba(20,20,40,0.9);border:1px solid rgba(118,75,162,0.3);border-radius:12px;padding:1rem;font-family:monospace;font-size:0.8rem;white-space:pre-wrap;max-height:300px;overflow-y:auto;display:none}
.ok{color:#10b981}.err{color:#ef4444}.info{color:#c084fc}
</style>
</head>
<body>
<h1>Watcher Patcher</h1>
<p style="color:rgba(255,255,255,0.5);max-width:500px;text-align:center;line-height:1.5">
Drop your <strong style="color:#10b981">watcher.html</strong> file below. This tool will remove the DMM button, update Comet and MediaFusion to require configuration, and add config links for all addons.
</p>

<div class="drop" id="drop" onclick="document.getElementById('fi').click()">
<div class="icon">📂</div>
<p>Drop watcher.html here or click to browse</p>
<input type="file" id="fi" accept=".html,.htm" style="display:none">
</div>

<div id="log"></div>

<script>
const drop = document.getElementById('drop');
const fi = document.getElementById('fi');
const log = document.getElementById('log');

function addLog(msg, cls) {
  log.style.display = 'block';
  const line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

function processFile(file) {
  log.innerHTML = '';
  addLog('Reading ' + file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)...', 'info');

  const reader = new FileReader();
  reader.onload = function(e) {
    let c = e.target.result;
    let n = 0;

    // CHANGE 1: Remove DMM button
    const dmm_btn = '<button class="addon-quick-btn" onclick="quickAddAddon(\'dmm\')">+ DMM</button>';
    if (c.includes(dmm_btn)) {
      c = c.replace(dmm_btn, '');
      n++; addLog('[1/6] Removed DMM quick-add button', 'ok');
    } else { addLog('[1/6] DMM button not found (skip)', 'info'); }

    // CHANGE 2: Remove DMM preset
    const dmm_preset = "    'dmm':          { name: 'DMM (Debrid Media Manager)', url: null }, // user must configure\n";
    if (c.includes(dmm_preset)) {
      c = c.replace(dmm_preset, '');
      n++; addLog('[2/6] Removed DMM from ADDON_PRESETS', 'ok');
    } else { addLog('[2/6] DMM preset not found (skip)', 'info'); }

    // CHANGE 3: Comet URL to null
    const comet_old = "    'comet':        { name: 'Comet',               url: 'https://comet.elfhosted.com' },";
    const comet_new = "    'comet':        { name: 'Comet',               url: null }, // configure at comet.elfhosted.com/configure";
    if (c.includes(comet_old)) {
      c = c.replace(comet_old, comet_new);
      n++; addLog('[3/6] Comet now requires config', 'ok');
    } else { addLog('[3/6] Comet preset not found (skip)', 'info'); }

    // CHANGE 4: MediaFusion URL to null
    const mf_old = "    'mediafusion':  { name: 'MediaFusion',         url: 'https://mediafusion.elfhosted.com' },";
    const mf_new = "    'mediafusion':  { name: 'MediaFusion',         url: null }, // configure at mediafusion.elfhosted.com/configure";
    if (c.includes(mf_old)) {
      c = c.replace(mf_old, mf_new);
      n++; addLog('[4/6] MediaFusion now requires config', 'ok');
    } else { addLog('[4/6] MediaFusion preset not found (skip)', 'info'); }

    // CHANGE 5: Replace DMM handler with Comet + MediaFusion config handlers
    const dmm_re = /    if \(presetKey === 'dmm'\) \{[\s\S]*?return;\s*\}/;
    const new_handlers =
      "    if (presetKey === 'comet') {\n" +
      "      window.open('https://comet.elfhosted.com/configure', '_blank');\n" +
      "      alert('Configure Comet with your Real-Debrid credentials on the page that just opened.\\n\\nOnce configured, copy the manifest URL and paste it into the custom URL field below.');\n" +
      "      return;\n" +
      "    }\n" +
      "    if (presetKey === 'mediafusion') {\n" +
      "      window.open('https://mediafusion.elfhosted.com/configure', '_blank');\n" +
      "      alert('Configure MediaFusion with your preferences and debrid credentials on the page that just opened.\\n\\nOnce configured, copy the manifest/addon URL and paste it into the custom URL field below.');\n" +
      "      return;\n" +
      "    }";
    if (dmm_re.test(c)) {
      c = c.replace(dmm_re, new_handlers);
      n++; addLog('[5/6] Replaced DMM handler with Comet + MediaFusion config', 'ok');
    } else { addLog('[5/6] DMM handler not found (skip)', 'info'); }

    // CHANGE 6: Update help text
    const help_marker = 'For Torrentio with RD caching';
    const idx = c.indexOf(help_marker);
    if (idx >= 0) {
      const searchStart = Math.max(0, idx - 300);
      let pStart = c.lastIndexOf('<p ', searchStart, idx);
      if (pStart < 0) pStart = c.lastIndexOf('<p>', searchStart);
      // Search backwards manually
      if (pStart < 0) {
        for (let i = idx - 1; i >= searchStart; i--) {
          if (c.substring(i, i+3) === '<p ' || c.substring(i, i+3) === '<p>') {
            pStart = i; break;
          }
        }
      }
      const pEnd = c.indexOf('</p>', idx);
      if (pStart >= 0 && pEnd >= 0) {
        const endPos = pEnd + 4;
        const newHelp =
          '<div style="font-size:0.68rem;color:rgba(255,255,255,0.25);margin-top:0.5rem;display:flex;flex-direction:column;gap:0.35rem;">\n' +
          '      <p>\uD83D\uDCA1 <strong style="color:var(--accent-green);">Torrentio</strong> \u2014 Configure with RD at <a href="https://torrentio.strem.fun/configure" target="_blank" rel="noopener" style="color:var(--accent-green);">torrentio.strem.fun/configure</a>, then copy the manifest URL and paste above.</p>\n' +
          '      <p>\uD83D\uDCA1 <strong style="color:#c084fc;">Comet</strong> \u2014 Configure with your debrid credentials at <a href="https://comet.elfhosted.com/configure" target="_blank" rel="noopener" style="color:#c084fc;">comet.elfhosted.com/configure</a>, then copy the manifest URL and paste above.</p>\n' +
          '      <p>\uD83D\uDCA1 <strong style="color:#ffa500;">MediaFusion</strong> \u2014 Configure at <a href="https://mediafusion.elfhosted.com/configure" target="_blank" rel="noopener" style="color:#ffa500;">mediafusion.elfhosted.com/configure</a>, then copy the addon URL and paste above.</p>\n' +
          '    </div>';
        c = c.substring(0, pStart) + newHelp + c.substring(endPos);
        n++; addLog('[6/6] Updated help text with all addon config links', 'ok');
      } else {
        addLog('[6/6] Could not find <p> boundaries (skip)', 'err');
      }
    } else { addLog('[6/6] Help text not found (skip)', 'info'); }

    addLog('', '');
    addLog(n + '/6 changes applied', n >= 5 ? 'ok' : 'err');
    addLog('Original: ' + e.target.result.length.toLocaleString() + ' chars', 'info');
    addLog('Modified: ' + c.length.toLocaleString() + ' chars', 'info');

    // Download the patched file
    const blob = new Blob([c], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'watcher.html';
    a.click();
    URL.revokeObjectURL(url);

    addLog('', '');
    addLog('Downloaded as watcher.html!', 'ok');

    drop.innerHTML = '<div class="icon" style="color:#10b981">\u2705</div><p style="color:#10b981">Patched! Check your downloads folder.</p>';
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
