<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Returning to Watcher…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: rgba(15, 15, 30, 0.98);
      border: 1.5px solid rgba(16, 185, 129, 0.5);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(16, 185, 129, 0.12), 0 20px 60px rgba(0,0,0,0.8);
    }

    .logo {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .title {
      font-family: 'Bebas Neue', 'Impact', cursive;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: #10b981;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .ep-label {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      background: rgba(118,75,162,0.2);
      border: 1px solid rgba(118,75,162,0.4);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(16,185,129,0.2);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 0.6rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #10b981, #764ba2);
      color: #fff;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      font-size: 0.82rem;
    }

    .note {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      margin-top: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📺</div>
    <div class="title">Watcher</div>
    <div class="subtitle" id="subtitle">Finished in Infuse — returning you now…</div>

    <div id="ep-label-wrap" style="display:none;">
      <div class="ep-label" id="ep-label"></div>
    </div>

    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Opening Watcher…</div>

    <a class="btn btn-primary" id="open-btn" href="#">▶ Open Watcher</a>
    <a class="btn btn-secondary" href="https://rud3boy.vercel.app/watcher">Open watcher.html directly</a>

    <p class="note">
      If Watcher doesn't open automatically, tap the button above.<br>
      You may need to close this Safari tab afterward.
    </p>
  </div>

  <script>
    // ── Parse callback params from Infuse x-success URL ──────────────────
    const params  = new URLSearchParams(location.search);
    const id      = params.get('id');
    const type    = params.get('type');
    const season  = params.get('season');
    const episode = params.get('episode');
    const cancelled = params.get('cancelled') === '1';

    // ── Build the Watcher deep-link URL preserving all callback params ──
    const watcherBase = 'https://rud3boy.vercel.app/watcher';
    const fwdParams = new URLSearchParams({ infuse_cb: '1' });
    if (id)        fwdParams.set('id', id);
    if (type)      fwdParams.set('type', type);
    if (season)    fwdParams.set('season', season);
    if (episode)   fwdParams.set('episode', episode);
    if (cancelled) fwdParams.set('cancelled', '1');
    const watcherUrl = `${watcherBase}?${fwdParams}`;

    // ── Update UI with context ────────────────────────────────────────────
    const subtitleEl  = document.getElementById('subtitle');
    const epLabelWrap = document.getElementById('ep-label-wrap');
    const epLabelEl   = document.getElementById('ep-label');
    const openBtn     = document.getElementById('open-btn');
    const statusEl    = document.getElementById('status');

    openBtn.href = watcherUrl;

    if (cancelled) {
      subtitleEl.textContent = 'Playback cancelled in Infuse.';
      statusEl.textContent   = 'Heading back…';
      document.getElementById('spinner').style.borderTopColor = '#764ba2';
    } else if (type === 'tv' && season && episode) {
      const epCode = `S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`;
      subtitleEl.textContent  = 'Episode finished in Infuse!';
      epLabelEl.textContent   = `✅ ${epCode} — marking as watched`;
      epLabelWrap.style.display = 'block';
    } else if (type === 'movie') {
      subtitleEl.textContent = 'Movie finished in Infuse!';
      epLabelEl.textContent  = '✅ Removing from Continue Watching';
      epLabelWrap.style.display = 'block';
    }

    // ── Auto-redirect after a short delay ────────────────────────────────
    // Give the page time to render so the user sees what's happening,
    // then fire the redirect. On iOS, location.replace keeps us out of
    // the back-stack so the user can't accidentally return to this page.
    let countdown = 2;
    const tick = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        statusEl.textContent = `Opening Watcher in ${countdown}…`;
      } else {
        clearInterval(tick);
        statusEl.textContent = 'Opening…';
        // Use location.replace so Safari doesn't add this page to history
        location.replace(watcherUrl);
      }
    }, 1000);

    // Also let the button work immediately (clears the auto-timer)
    openBtn.addEventListener('click', () => clearInterval(tick));
  </script>
</body>
</html>
