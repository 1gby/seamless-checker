const rows = [];
let filter = 'all';

window.onload = () => {
  const tbody = document.getElementById('tbody');
  entries.forEach((e,i) => {
    const typeCls = e.type==='archive_download'?'b-dl':e.type==='dailymotion'?'b-dm':'b-id';
    const typeLabel = e.type==='archive_download'?'DL':e.type==='dailymotion'?'DM':'ID';
    const tr = document.createElement('tr');
    tr.id = 'r'+i;
    tr.innerHTML = `<td>${i+1}</td>
      <td class="lbl" title="${e.label}">${e.label}</td>
      <td><span class="badge ${typeCls}">${typeLabel}</span></td>

      <td style="color:#444;font-size:0.65rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="det${i}">—</td>
      <td class="url-td" title="${e.url}">${e.url}</td>`;
    tbody.appendChild(tr);
    rows.push(tr);
  });
};

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rows.forEach(tr => {
    const st = document.getElementById(tr.id.replace('r','st'));
    const cls = st ? [...st.classList].find(c=>['ok','dead','warn','pend'].includes(c))||'pend' : 'pend';
    tr.classList.toggle('hidden', f!=='all' && cls!==f);
  });
}

function applyRowFilter(i) {
  const st = document.getElementById('st'+i);
  const cls = st ? [...st.classList].find(c=>['ok','dead','warn','pend'].includes(c))||'pend' : 'pend';
  rows[i].classList.toggle('hidden', filter!=='all' && cls!==filter);
}

async function checkArchive(entry, i) {
  const st = document.getElementById('st'+i);
  const det = document.getElementById('det'+i);
  try {
    const t0 = Date.now();
    const res = await fetch(entry.metadata_url, {signal: AbortSignal.timeout(15000)});
    if (!res.ok) {
      st.className = 'st dead'; st.textContent = '❌ '+res.status;
      det.textContent = 'Identifier not found'; return;
    }
    const data = await res.json();
    const ms = Date.now()-t0;

    if (!data || data.error) {
      st.className = 'st dead'; st.textContent = '❌ Error';
      det.textContent = data?.error || 'No data'; return;
    }

    if (entry.type === 'archive_id') {
      // Just check identifier exists
      st.className = 'st ok'; st.textContent = '✅ '+ms+'ms';
      det.textContent = data.metadata?.title?.[0] || 'Found';
      return;
    }

    // archive_download — check if the specific file exists
    if (!data.files || data.files.length === 0) {
      st.className = 'st dead'; st.textContent = '❌ No files';
      det.textContent = 'Identifier exists but empty'; return;
    }

    // Decode filename for comparison
    const targetFile = decodeURIComponent(entry.filename).replace(/\+/g,' ');
    // Check exact match or partial match
    const found = data.files.find(f => {
      const fn = f.name.replace(/^.*\//, ''); // strip folder
      const tfn = targetFile.replace(/^.*\//, '');
      return f.name === targetFile || fn === tfn ||
             f.name.toLowerCase().includes(fn.toLowerCase().split('.')[0]);
    });

    if (found) {
      const size = found.size ? (parseInt(found.size)/1048576).toFixed(0)+'MB' : '?MB';
      st.className = ms>8000?'st warn':'st ok';
      st.textContent = (ms>8000?'⚠️':'✅')+' '+ms+'ms';
      det.textContent = size+' · '+found.format;
    } else {
      st.className = 'st dead'; st.textContent = '❌ File missing';
      const title = data.metadata?.title?.[0] || '';
      det.textContent = 'ID ok, file not found: '+targetFile.split('/').pop().substring(0,30);
    }
  } catch(e) {
    st.className = 'st dead';
    st.textContent = '❌ '+(e.name==='TimeoutError'?'Timeout':'Error');
    det.textContent = e.message?.substring(0,40)||'';
  }
}

async function checkDailymotion(entry, i) {
  const st = document.getElementById('st'+i);
  const det = document.getElementById('det'+i);
  try {
    const t0 = Date.now();
    const res = await fetch(entry.metadata_url, {signal: AbortSignal.timeout(10000)});
    const data = await res.json();
    const ms = Date.now()-t0;
    if (data.error) {
      st.className='st dead'; st.textContent='❌ Gone';
      det.textContent=data.error?.message||'Not found';
    } else {
      st.className='st ok'; st.textContent='✅ '+ms+'ms';
      det.textContent=(data.title||'').substring(0,35);
    }
  } catch(e) {
    st.className='st dead'; st.textContent='❌ Error';
    det.textContent=e.message?.substring(0,30)||'';
  }
}

async function checkEntry(entry, i) {
  if (entry.type === 'dailymotion') return checkDailymotion(entry, i);
  return checkArchive(entry, i);
}

async function startCheck() {
  document.getElementById('startBtn').disabled = true;
  const bar = document.getElementById('bar');
  const stats = document.getElementById('stats');
  const BATCH = 6;
  let done = 0;
  for (let i=0; i<entries.length; i+=BATCH) {
    const batch = [];
    for (let j=i; j<Math.min(i+BATCH,entries.length); j++) batch.push(checkEntry(entries[j],j));
    await Promise.all(batch);
    done = Math.min(i+BATCH, entries.length);
    bar.style.width = (done/entries.length*100).toFixed(0)+'%';
    const ok = document.querySelectorAll('.ok').length;
    const dead = document.querySelectorAll('.dead').length;
    stats.textContent = `${done}/${entries.length} checked — ✅ ${ok} OK  ❌ ${dead} Dead`;
    entries.slice(i, Math.min(i+BATCH, entries.length)).forEach((_,j) => applyRowFilter(i+j));
  }
  const ok = document.querySelectorAll('.ok').length;
  const dead = document.querySelectorAll('.dead').length;
  stats.textContent = `Done! ✅ ${ok} OK  ❌ ${dead} Dead  out of ${entries.length}`;
  document.getElementById('startBtn').disabled = false;
}

function exportDead() {
  const deadEntries = [];
  
  entries.forEach((e, i) => {
    const st = document.getElementById('st' + i);
    if (st && st.classList.contains('dead')) {
      const det = document.getElementById('det' + i);
      deadEntries.push({
        label: e.label,
        url: e.url,
        detail: det ? det.textContent.trim() : ''
      });
    }
  });

  if (!deadEntries.length) {
    alert('No dead links yet — run Check All first');
    return;
  }

  const txt = deadEntries.map(item => 
    `${item.label}: ${item.detail}\n  ${item.url}`
  ).join('\n\n');

  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
  a.download = 'dead_urls.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
